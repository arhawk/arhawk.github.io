name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Prepare GitHub Pages files
        run: |
          rm -rf assets
          cp dist/index.template.html index.html
          cp -r dist/assets assets
          touch .nojekyll

      - name: Commit and push built site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy built site to GitHub Pages"
          git push
